default_language_version:
  python: python3.11
repos:
  - repo: local
    hooks:
      - id: format-check
        name: format-check
        entry: python -c "print('ok')"
        language: python
      - id: lint-check
        name: lint-check
        entry: python -c "print('ok')"
        language: python
        language_version: python3.12
