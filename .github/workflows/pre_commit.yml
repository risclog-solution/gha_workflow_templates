name: Pre-commit

on:
  workflow_call:
    inputs:
      python_version:
        default: ""
        required: false
        type: string

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Resolve Python version
      id: resolve-python
      env:
        DEFAULT_PYTHON_VERSION: "3.9"
        INPUT_PYTHON_VERSION: ${{ inputs.python_version }}
      run: |
        ruby .github/scripts/resolve_pre_commit_python.rb >> "$GITHUB_OUTPUT"
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.resolve-python.outputs.python-version }}
    - uses: pre-commit/action@v3.0.0
